<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDRI — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #0e0e0e;
  --surface: #1a1a1a;
  --border:  #2a2a2a;
  --text:    #f0ece4;
  --muted:   #888880;
  --subtle:  #444440;
  --accent:  #3d9970;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(61,153,112,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(61,153,112,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

.login-wrap {
  width: 100%;
  max-width: 360px;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.login-header {
  text-align: center;
  margin-bottom: 40px;
}

.login-logo {
  font-family: 'DM Mono', monospace;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 7px;
  color: var(--accent);
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}

.login-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -.5px;
}

.login-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--subtle);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 6px;
}

.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px 24px;
}

.login-divider {
  height: 2px;
  background: var(--accent);
  width: 32px;
  margin: 0 auto 28px;
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: #0e0e0e;
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}

.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--subtle); }

.btn-login {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 13px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  margin-top: 8px;
  transition: background .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-login:hover { background: #52c28f; }

.login-error {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #e05555;
  text-align: center;
  margin-top: 14px;
  min-height: 16px;
  letter-spacing: .5px;
  display: none;
}

.login-error.visible { display: block; }

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--subtle);
  letter-spacing: 1px;
}

.spinner {
  width: 11px; height: 11px;
  border: 1.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .55s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading .spinner { display: block; }
.loading .btn-text { display: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <span class="login-logo">PEDRI</span>
    <h1 class="login-title">Welcome back.</h1>
    <p class="login-sub">Content intelligence platform</p>
  </div>

  <div class="login-box">
    <div class="login-divider"></div>
    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner"></span>
        <span class="btn-text">Sign in</span>
      </button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>

  <div class="login-footer">Restricted access &mdash; authorized users only</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  btn.classList.add('loading');
  err.classList.remove('visible');

  try {
    var res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    var data = await res.json();
    if (res.ok && data.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Invalid credentials';
      err.classList.add('visible');
    }
  } catch(e) {
    err.textContent = 'Connection error';
    err.classList.add('visible');
  } finally {
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
