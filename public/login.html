<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedri — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Literata:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --border: #e2ddd6;
    --border2: #cec7bd;
    --text: #1a1916;
    --muted: #5c564f;
    --accent: #c49a0e;
    --danger: #c0392b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Literata', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border2);
    width: 100%;
    max-width: 380px;
    padding: 48px 40px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .login-logo em { color: var(--accent); font-style: normal; }
  .login-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 40px;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    background: #f9f7f4;border: 1px solid #cec7bd;
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-login:hover { background: #f8d060; }
  .btn-login:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .btn-login.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    display: none;
    background: rgba(240,64,96,0.1);
    border: 1px solid rgba(240,64,96,0.3);
    color: var(--danger);
    padding: 10px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    margin-top: 16px;
  }
  .error-msg.visible { display: block; }
  .login-footer {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">PEDRI</div>
  <div class="login-sub">Herramientas internas de contenido con IA</div>

  <div class="field">
    <label>Usuario</label>
    <input type="text" id="username" autocomplete="username" autofocus />
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" />
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <span class="spinner"></span>
    Entrar
  </button>

  <div class="error-msg" id="errorMsg">Credenciales incorrectas</div>

  <div class="login-footer">Acceso restringido · Uso interno</div>
</div>

<script>
  // Permitir Enter para hacer login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) return;

    btn.disabled = true;
    btn.classList.add('loading');
    err.classList.remove('visible');

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (res.ok && data.ok) {
        window.location.href = data.redirect || '/';
      } else {
        err.textContent = data.error || 'Credenciales incorrectas';
        err.classList.add('visible');
        document.getElementById('password').value = '';
      }
    } catch(e) {
      err.textContent = 'Error de conexión con el servidor';
      err.classList.add('visible');
    }

    btn.disabled = false;
    btn.classList.remove('loading');
  }
</script>
</body>
</html>
